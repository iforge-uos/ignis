name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-restart:
    runs-on: self-hosted

    steps:
      - name: Pull the latest changes
        working-directory: /home/iforge/ignis/
        run: git pull

      - name: Notify Discord Maintenance Start
        uses: tsickert/discord-webhook@v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_CICD_WEBHOOK_NOTI_URL}}
          embed-title: "Ignis Entering Maintenance Mode"
          embed-color: 15548997
          embed-description: "Ignis is going down for maintenance and will be back up shortly"
      - name: Throw up the maintenance page
        run: touch /home/iforge/ignis-config/file_flags/maintenance_mode/enabled

      - name: Setup Bun
        run: |
          echo "/home/iforge/.nvm/versions/node/v20.11.0/bin" >> $GITHUB_PATH
          echo "/home/iforge/.bun/bin" >> $GITHUB_PATH
          echo "/home/iforge/.cargo/bin" >> $GITHUB_PATH

      - name: Install Packages
        working-directory: /home/iforge/ignis
        run: bun install --frozen-lockfile

      - name: Build the project
        working-directory: /home/iforge/ignis/
        env:
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}
          OP_CONNECT_HOST: ${{ secrets.OP_CONNECT_HOST }}
        run: bun run turbo build

      - name: Restart forge
        working-directory: /home/iforge/ignis/apps/forge
        env:
          NODE_ENV: production
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}
          OP_CONNECT_HOST: ${{ secrets.OP_CONNECT_HOST }}
          PM2_COMMAND: /home/iforge/.local/share/pnpm/pm2
        run: |
          set -euo pipefail

          export PATH="$PATH:/home/iforge/.local/bin"

          if [ ! -x "$PM2_COMMAND" ]; then
            echo "Error: pm2 command not found."
            exit 1
          fi

          # Always delete and recreate so pm2 stores the fresh OP_CONNECT_TOKEN.
          if "$PM2_COMMAND" describe forge >/dev/null 2>&1; then
            echo "Removing existing forge process..."
            "$PM2_COMMAND" delete forge
          fi

          echo "Starting forge..."
          "$PM2_COMMAND" start bun --name forge -- run start:raw

          "$PM2_COMMAND" save

      - name: Restart mine
        working-directory: /home/iforge/ignis/apps/mine
        env:
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}
          OP_CONNECT_HOST: ${{ secrets.OP_CONNECT_HOST }}
          PM2_COMMAND: /home/iforge/.local/share/pnpm/pm2
        run: |
          set -euo pipefail
          export PATH="$PATH:/home/iforge/.local/bin"

          if "$PM2_COMMAND" describe mine >/dev/null 2>&1; then
            echo "Removing existing mine process..."
            "$PM2_COMMAND" delete mine
          fi

          echo "Starting mine..."
          "$PM2_COMMAND" start bun --name mine -- run start:raw

          "$PM2_COMMAND" save

      - name: Remove maintenance page
        run: rm /home/iforge/ignis-config/file_flags/maintenance_mode/enabled

      - name: Notify Discord Maintenance End
        uses: tsickert/discord-webhook@v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_CICD_WEBHOOK_NOTI_URL}}
          embed-title: "Ignis Exiting Maintenance Mode"
          embed-color: 5763719
          embed-description: "Ignis is back online!"